<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sudanghelp-data · ops monitor</title>
<meta name="description" content="sudanghelp.co.kr 의 cron · Worker · KV 신호 헬스 모니터.">
<meta name="robots" content="noindex">

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

<style>
:root {
  --bg: #0a0a0a;
  --surface: #111;
  --border: #1f1f1f;
  --border-strong: #2a2a2a;
  --text: #e8e8e8;
  --text-2: #9a9a9a;
  --text-3: #5a5a5a;
  --accent: #10b981;
  --accent-dim: rgba(16, 185, 129, 0.12);
  --warn: #d97706;
  --down: #dc2626;
  --pending: #404040;
  --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: "Pretendard", system-ui, -apple-system, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

a { color: inherit; text-decoration: none; }

.tabular { font-variant-numeric: tabular-nums; }

.container {
  max-width: 1240px;
  margin: 0 auto;
  padding: 56px 32px 96px;
}

/* ========== Header ========== */
.hd {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
  gap: 24px;
}
.hd-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.hd-title .accent { color: var(--accent); }
.hd-sub {
  font-size: 12px;
  color: var(--text-3);
  margin-top: 2px;
  letter-spacing: 0.005em;
}
.hd-meta {
  text-align: right;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 0.02em;
}
.hd-meta .now { color: var(--text-2); display: block; margin-bottom: 2px; }

/* ========== Verdict bar ========== */
.verdict {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  margin-bottom: 40px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 2px solid var(--pending);
}
.verdict.ok       { border-left-color: var(--accent); }
.verdict.stale,
.verdict.fallback,
.verdict.deploy_pending { border-left-color: var(--warn); }
.verdict.cron_down,
.verdict.down     { border-left-color: var(--down); }

.verdict-tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  font-weight: 500;
  padding: 3px 8px;
  border: 1px solid var(--border-strong);
  color: var(--text-2);
}
.verdict.ok .verdict-tag       { color: var(--accent); border-color: rgba(16, 185, 129, 0.3); }
.verdict.stale .verdict-tag,
.verdict.fallback .verdict-tag,
.verdict.deploy_pending .verdict-tag { color: var(--warn); border-color: rgba(217, 119, 6, 0.3); }
.verdict.down .verdict-tag,
.verdict.cron_down .verdict-tag { color: var(--down); border-color: rgba(220, 38, 38, 0.3); }

.verdict-text {
  font-size: 13px;
  color: var(--text-2);
  letter-spacing: -0.005em;
}

/* ========== Super sections (정기 데이터 / 실시간) ========== */
.super-section {
  margin-bottom: 40px;
}
.super-section:last-child {
  margin-bottom: 0;
}
.super-heading {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin: 0 0 20px 0;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.super-sub {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: none;
  color: var(--text-3);
  margin-left: 8px;
}

/* ========== Groups grid (cadence 그룹 — auto-fit) ========== */
.groups {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
}

.group {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.group-hd {
  padding-bottom: 12px;
  margin-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.group-cadence {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--text-3);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.group-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
}
.group-desc {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text-3);
  margin-top: 4px;
  letter-spacing: 0.005em;
}

/* ========== Source card ========== */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: border-color 120ms;
}
.card.pending { opacity: 0.55; }
.card:hover { border-color: var(--border-strong); }

.card-hd {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.card-name {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.005em;
  color: var(--text);
  line-height: 1.35;
}
.card-name a {
  color: inherit;
  border-bottom: 1px dotted var(--text-3);
  padding-bottom: 1px;
}
.card-name a:hover {
  border-bottom-color: var(--accent);
  color: var(--accent);
}
.card-status {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  font-weight: 500;
  padding: 2px 6px;
  border: 1px solid var(--border-strong);
  color: var(--text-3);
  flex-shrink: 0;
  text-transform: uppercase;
  line-height: 1.4;
}
.card-status.ok       { color: var(--accent); border-color: rgba(16, 185, 129, 0.3); }
.card-status.stale,
.card-status.fallback { color: var(--warn);   border-color: rgba(217, 119, 6, 0.3); }
.card-status.down     { color: var(--down);   border-color: rgba(220, 38, 38, 0.3); }
.card-status.pending  { color: var(--text-3); }

.card-tech {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 0.005em;
  line-height: 1.5;
}

.card-metrics {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 10px 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.metric-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 8px;
}
.metric-label {
  font-size: 11px;
  color: var(--text-3);
  font-family: var(--mono);
  letter-spacing: 0.02em;
}
.metric-value {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text);
  font-feature-settings: "tnum";
}
.metric-delta {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-3);
  margin-left: 6px;
}
.metric-delta.up   { color: var(--accent); }
.metric-delta.down { color: var(--warn); }

.card-signals {
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 0.01em;
}
.signal { white-space: normal; word-break: keep-all; }
.signal.ok       { color: var(--accent); }
.signal.stale,
.signal.fallback { color: var(--warn); }
.signal.down     { color: var(--down); }

.card-pending-note {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text-3);
  letter-spacing: 0.01em;
}

/* ========== Footer ========== */
.ft {
  margin-top: 56px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 0.02em;
}
.ft-links { display: flex; gap: 18px; flex-wrap: wrap; }
.ft-links a { color: var(--text-2); }
.ft-links a:hover { color: var(--accent); }

/* ========== Responsive ========== */
@media (max-width: 1080px) {
  /* auto-fit handles 1024px naturally */
}
@media (max-width: 720px) {
  .container { padding: 36px 18px 64px; }
  .groups { gap: 24px; }
  .hd { flex-direction: column; align-items: flex-start; gap: 12px; }
  .hd-meta { text-align: left; }
}
</style>
</head>
<body>

<div class="container">

  <header class="hd">
    <div>
      <div class="hd-title">sudanghelp<span class="accent">-data</span></div>
      <div class="hd-sub">operational monitor · cron · worker · kv</div>
    </div>
    <div class="hd-meta">
      <span class="now" id="now-ts">—</span>
      poll hourly · refresh 60s
    </div>
  </header>

  <div class="verdict" id="verdict">
    <span class="verdict-tag" id="verdict-tag">LOADING</span>
    <span class="verdict-text" id="verdict-text">최신 status 가져오는 중</span>
  </div>

  <div id="root">
    <!-- 클라이언트 렌더 — 2 super-section (정기 데이터 / 실시간) -->
  </div>

  <footer class="ft">
    <div>v2 · schema 4 · 2-section layout</div>
    <div class="ft-links">
      <a href="https://sudanghelp.co.kr">main site</a>
      <a href="https://github.com/seansble/sudanghelp-data">repo</a>
      <a href="https://github.com/seansble/sudanghelp-data/blob/main/status/latest.json">status.json</a>
      <a href="https://github.com/seansble/sudanghelp-data/blob/main/LICENSE">cc-by-4.0</a>
    </div>
  </footer>

</div>

<script>
'use strict';

const STATUS_URL = 'status/latest.json';

const VERDICT = {
  ok:             ['HEALTHY',         '모든 cron 정상 · 라이브 fresh · fallback 없음'],
  stale:          ['CRON SLOW',       'cron 실행됐지만 임계 시간 초과'],
  fallback:       ['FALLBACK',        'cron 실행됐지만 콘텐츠 미변동 (상위 API 의심)'],
  deploy_pending: ['DEPLOY PENDING',  'cron 정상 · 라이브만 stale (배포 또는 캐시 문제)'],
  cron_down:      ['CRON DOWN',       'GitHub Actions cron 자체가 멈춤'],
  down:           ['DOWN',            '하나 이상의 신호 fetch 실패'],
  loading:        ['LOADING',         '최신 status 가져오는 중'],
  unknown:        ['NO DATA',         'status/latest.json 미생성'],
};

const STATUS_LABEL = {
  ok: 'OK', stale: 'STALE', down: 'DOWN', fallback: 'FALLBACK',
  pending: 'PENDING', unknown: '—', unauthorized: 'NO TOKEN',
};

function fmtAge(min) {
  if (min == null) return '—';
  if (min < 1) return '방금';
  if (min < 60) return `${min}m 전`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h 전`;
  const day = Math.floor(hr / 24);
  return `${day}d 전`;
}

// ISO UTC → "YYYY-MM-DD HH:MM" KST 표시
function fmtKstTime(isoUtc) {
  if (!isoUtc) return '';
  const ms = Date.parse(isoUtc);
  if (isNaN(ms)) return '';
  // UTC → KST 수동 오프셋 (브라우저 timezone 무관하게 KST 강제)
  const d = new Date(ms + 9 * 60 * 60 * 1000);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getUTCFullYear()}-${pad(d.getUTCMonth() + 1)}-${pad(d.getUTCDate())} `
       + `${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}`;
}

function fmtItems(n) {
  if (n == null) return '—';
  return n.toLocaleString('en-US');
}

function fmtSize(bytes) {
  if (bytes == null) return '—';
  if (bytes < 1024) return `${bytes}B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)}KB`;
  return `${(bytes / 1024 / 1024).toFixed(2)}MB`;
}

function fmtDelta(v, kind) {
  if (v == null) return null;
  if (v === 0) return '±0';
  const sign = v > 0 ? '+' : '−';   // ASCII minus 대신 typographic minus (정렬용)
  const abs = Math.abs(v);
  if (kind === 'size') return sign + fmtSize(abs);
  return sign + abs.toLocaleString('en-US');
}

function deltaCls(v) {
  if (v == null || v === 0) return '';
  return v > 0 ? 'up' : 'down';
}

function setVerdict(level) {
  const [tag, desc] = VERDICT[level] || VERDICT.unknown;
  const el = document.getElementById('verdict');
  el.className = `verdict ${level || 'unknown'}`;
  document.getElementById('verdict-tag').textContent = tag;
  document.getElementById('verdict-text').textContent = desc;
}

function combinedStatus(src) {
  // pending sources stay pending
  if (src.status === 'pending') return 'pending';
  const cron = src.cron?.status;
  // v4: fallback flag 은 informational. status (age 기반) 만으로 badge 결정.
  // hash 가 직전 poll 과 같아도 임계값 안쪽이면 정상 (자연 변동).
  const live = src.status;
  if (cron === 'down') return 'down';
  if (cron === 'stale') return 'stale';
  if (cron === 'ok' && (live === 'down' || live === 'stale')) return 'deploy_pending';
  if (live === 'ok') return 'ok';
  return live || 'unknown';
}

function statusToTag(s) {
  if (s === 'deploy_pending') return 'DEPLOY';
  return STATUS_LABEL[s] || s.toUpperCase();
}

function statusToClass(s) {
  if (s === 'deploy_pending' || s === 'fallback') return 'stale';
  if (s === 'unauthorized') return 'pending';
  return s;
}

function renderSignal(label, level, age, updatedAt) {
  if (level === 'unauthorized') return `${label}: no token`;
  if (level == null) return `${label} —`;
  const statusStr = (STATUS_LABEL[level] || level).toUpperCase();
  const timeStr = updatedAt ? ` ${fmtKstTime(updatedAt)} KST` : '';
  const ageStr = age != null ? ` · ${fmtAge(age)}` : '';
  return `${label} ${statusStr}${timeStr}${ageStr}`;
}

// 2-tier 의 2차 (내용) 시그널
function renderContentSignal(content) {
  if (!content) return '내용 —';
  const statusStr = (STATUS_LABEL[content.status] || content.status || 'unknown').toUpperCase();
  const reason = content.reason ? ` · ${content.reason}` : '';
  return `내용 ${statusStr}${reason}`;
}

function renderCard(srcKey, src) {
  const combined = combinedStatus(src);
  const cls = statusToClass(combined);
  const isPending = src.status === 'pending';

  let metricsHtml = '';
  if (!isPending && src.metrics) {
    const d = src.delta;
    const itemsDelta = d ? fmtDelta(d.items, 'items') : null;
    const sizeDelta  = d ? fmtDelta(d.size_bytes, 'size') : null;
    const itemsCls = deltaCls(d?.items);
    const sizeCls  = deltaCls(d?.size_bytes);

    metricsHtml = `
      <div class="card-metrics">
        <div class="metric-row">
          <span class="metric-label">items</span>
          <span>
            <span class="metric-value">${fmtItems(src.metrics.items)}</span>
            ${itemsDelta ? `<span class="metric-delta ${itemsCls}">${itemsDelta}</span>` : ''}
          </span>
        </div>
        <div class="metric-row">
          <span class="metric-label">size</span>
          <span>
            <span class="metric-value">${fmtSize(src.metrics.size_bytes)}</span>
            ${sizeDelta ? `<span class="metric-delta ${sizeCls}">${sizeDelta}</span>` : ''}
          </span>
        </div>
      </div>
    `;
  }

  let signalsHtml = '';
  if (!isPending) {
    const cron = src.cron;
    // v4.3: 2-tier 시그널
    //   1차 (시간): freshness.time_status — age vs cadence 임계값
    //   2차 (내용): content.status — items 정상 여부
    const timeLevel = src.freshness?.time_status || src.status;
    const timeAge = src.freshness?.age_min;
    const timeTs = src.freshness?.updated_at;
    const content = src.content;

    const cronLine = cron
      ? `<span class="signal ${statusToClass(cron.status)}">${renderSignal('cron', cron.status, cron.age_min, cron.started_at)}</span>`
      : '';
    const timeLine = `<span class="signal ${statusToClass(timeLevel)}">${renderSignal('시간', timeLevel, timeAge, timeTs)}</span>`;
    const contentLine = content
      ? `<span class="signal ${statusToClass(content.status)}">${renderContentSignal(content)}</span>`
      : '';

    signalsHtml = `<div class="card-signals">${cronLine}${timeLine}${contentLine}</div>`;
  } else {
    signalsHtml = `<div class="card-pending-note">${src.data_label || ''}</div>`;
  }

  const link = src.page_url
    ? `<a href="${src.page_url}" target="_blank" rel="noopener">${src.page_label}</a>`
    : src.page_label;

  return `
    <article class="card ${isPending ? 'pending' : ''}">
      <div class="card-hd">
        <div class="card-name">${link}</div>
        <span class="card-status ${cls}">${statusToTag(combined)}</span>
      </div>
      <div class="card-tech">${src.tech_context || ''}</div>
      ${metricsHtml}
      ${signalsHtml}
    </article>
  `;
}

function renderGroup(groupKey, group) {
  const cards = Object.entries(group.sources)
    .map(([k, s]) => renderCard(k, s))
    .join('');

  return `
    <section class="group" data-group="${groupKey}">
      <header class="group-hd">
        <div class="group-cadence">${groupKey}</div>
        <div class="group-label">${group.label}</div>
        <div class="group-desc">${group.description}</div>
      </header>
      ${cards}
    </section>
  `;
}

function renderSuperSection(label, sub, groupKeys, snapGroups) {
  const inner = groupKeys
    .filter(gk => snapGroups[gk])
    .map(gk => renderGroup(gk, snapGroups[gk]))
    .join('');
  if (!inner) return '';
  return `
    <section class="super-section">
      <h2 class="super-heading">${label}<span class="super-sub">— ${sub}</span></h2>
      <div class="groups">${inner}</div>
    </section>
  `;
}

async function refresh() {
  try {
    const r = await fetch(STATUS_URL + '?_=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) throw new Error(r.status);
    const snap = await r.json();

    setVerdict(snap.overall || 'unknown');

    const groups = snap.groups || {};
    // 순서: 실시간 → 시간 단위 → 매일 단위 (freshest 우선, 운영 패턴 자연 매핑)
    const html =
      renderSuperSection('실시간 사용자 활동', 'Live KV',     ['realtime'],         groups) +
      renderSuperSection('정기 데이터',         'Cron · Worker', ['hourly', 'daily'], groups);

    document.getElementById('root').innerHTML = html;
  } catch (e) {
    setVerdict('unknown');
    document.getElementById('root').innerHTML = '';
    console.warn('status fetch failed:', e.message);
  }
}

function tickClock() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('now-ts').textContent =
    `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ` +
    `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())} KST`;
}

tickClock();
setInterval(tickClock, 1000);
refresh();
setInterval(refresh, 60000);
</script>

</body>
</html>
