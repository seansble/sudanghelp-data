<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sudanghelp-data · 실시간 헬스 모니터</title>
<meta name="description" content="sudanghelp.co.kr 의 cron + API 신호가 정상 동작 중인지, fallback 발생 여부를 매시간 추적하는 모니터.">
<meta name="robots" content="noindex">

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">

<style>
:root {
  --bg: #0a0a0a;
  --surface: #131313;
  --surface-2: #1a1a1a;
  --border: #262626;
  --text: #ededed;
  --text-dim: #888;
  --text-muted: #555;
  --accent: #10b981;
  --warn: #f59e0b;
  --down: #ef4444;
  --mono: ui-monospace, SFMono-Regular, "SF Mono", Consolas, "Liberation Mono", monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: "Pretendard", system-ui, -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.container {
  max-width: 880px;
  margin: 0 auto;
  padding: 48px 24px 80px;
}

/* Header */
.hd {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 36px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.hd h1 {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}
.hd h1 .accent { color: var(--accent); }
.hd .sub {
  color: var(--text-dim);
  font-size: 13px;
}
.hd .meta {
  text-align: right;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-muted);
}
.hd .meta .now { color: var(--text-dim); }

/* Overall banner */
.banner {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 22px;
  margin-bottom: 28px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
}
.banner .verdict {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.banner .desc {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 2px;
}
.banner.ok    { border-left: 3px solid var(--accent); }
.banner.stale { border-left: 3px solid var(--warn); }
.banner.fallback { border-left: 3px solid var(--warn); }
.banner.down  { border-left: 3px solid var(--down); }
.banner.ok    .verdict { color: var(--accent); }
.banner.stale .verdict { color: var(--warn); }
.banner.fallback .verdict { color: var(--warn); }
.banner.down  .verdict { color: var(--down); }

.section { margin-bottom: 36px; }
.section-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.status-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px 20px;
}
.card-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.card-name {
  font-size: 13px;
  color: var(--text-dim);
  font-weight: 500;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
  flex-shrink: 0;
}
.dot.ok { background: var(--accent); box-shadow: 0 0 8px rgba(16, 185, 129, 0.4); }
.dot.stale, .dot.fallback { background: var(--warn); box-shadow: 0 0 8px rgba(245, 158, 11, 0.4); }
.dot.down { background: var(--down); box-shadow: 0 0 8px rgba(239, 68, 68, 0.4); }
.dot.loading, .dot.unknown, .dot.pending { background: var(--text-muted); animation: pulse 1.4s ease-in-out infinite; }

@keyframes pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

.card-value {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
}
.card-value .unit {
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 400;
  margin-left: 4px;
}
.card-meta {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
}
.card-meta .label {
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.card-meta .label.ok { color: var(--accent); }
.card-meta .label.stale, .card-meta .label.fallback { color: var(--warn); }
.card-meta .label.down { color: var(--down); }
.card-meta .badge {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.card-meta .badge.fallback { color: var(--warn); border-color: var(--warn); }

/* Footer */
.ft {
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  font-size: 12px;
  color: var(--text-muted);
}
.ft .links { display: flex; gap: 18px; flex-wrap: wrap; }
.ft .links a { color: var(--text-dim); }
.ft .links a:hover { color: var(--accent); }

@media (max-width: 600px) {
  .container { padding: 32px 16px 60px; }
  .hd { flex-direction: column; align-items: flex-start; gap: 12px; }
  .hd .meta { text-align: left; }
}
</style>
</head>
<body>

<div class="container">

  <header class="hd">
    <div>
      <h1>sudanghelp<span class="accent">-data</span></h1>
      <div class="sub">실시간 헬스 모니터 · cron + API fallback 추적</div>
    </div>
    <div class="meta">
      <div class="now" id="now-ts">—</div>
      <div>poll hourly · auto-refresh 60s</div>
    </div>
  </header>

  <div class="banner loading" id="banner">
    <span class="dot loading" id="banner-dot"></span>
    <div>
      <div class="verdict" id="banner-verdict">로딩 중…</div>
      <div class="desc" id="banner-desc">최신 status 가져오는 중</div>
    </div>
  </div>

  <section class="section">
    <div class="section-title">
      <i class="ph ph-pulse"></i> 데이터 신선도
    </div>
    <div class="status-grid">

      <article class="card" data-card="rates">
        <div class="card-head">
          <span class="card-name">FSS 예적금 금리</span>
          <span class="dot loading"></span>
        </div>
        <div class="card-value" data-field="value">—</div>
        <div class="card-meta">
          <span data-field="age">—</span>
          <span class="label" data-field="label">—</span>
        </div>
      </article>

      <article class="card" data-card="promos">
        <div class="card-head">
          <span class="card-name">SNS 특판 (네이버+카카오)</span>
          <span class="dot loading"></span>
        </div>
        <div class="card-value" data-field="value">—</div>
        <div class="card-meta">
          <span data-field="age">—</span>
          <span class="label" data-field="label">—</span>
        </div>
      </article>

      <article class="card" data-card="cron">
        <div class="card-head">
          <span class="card-name">메인 cron</span>
          <span class="dot loading"></span>
        </div>
        <div class="card-value" data-field="value">—</div>
        <div class="card-meta">
          <span data-field="age">—</span>
          <span class="label" data-field="label">—</span>
        </div>
      </article>

      <article class="card" data-card="workers">
        <div class="card-head">
          <span class="card-name">Cloudflare Workers</span>
          <span class="dot pending"></span>
        </div>
        <div class="card-value">—</div>
        <div class="card-meta">
          <span>v2 예정</span>
          <span class="label">PENDING</span>
        </div>
      </article>

    </div>
  </section>

  <footer class="ft">
    <div>v0 · operational monitor for sudanghelp.co.kr</div>
    <div class="links">
      <a href="https://sudanghelp.co.kr">Main site</a>
      <a href="https://github.com/seansble/sudanghelp-data">Repo</a>
      <a href="https://github.com/seansble/sudanghelp-data/blob/main/status/latest.json">status.json</a>
      <a href="https://github.com/seansble/sudanghelp-data/blob/main/LICENSE">CC-BY-4.0</a>
    </div>
  </footer>

</div>

<script>
const STATUS_URL = 'status/latest.json';

const VERDICT_COPY = {
  ok:       { text: 'ALL HEALTHY',     desc: '모든 신호 fresh, fallback 없음' },
  stale:    { text: 'STALE DETECTED',  desc: '일부 데이터가 24시간+ 오래됨' },
  fallback: { text: 'FALLBACK ACTIVE', desc: 'cron 실행됐지만 콘텐츠 미변동 — 상위 API 의심' },
  down:     { text: 'SERVICE DOWN',    desc: '하나 이상의 신호 fetch 실패' },
  loading:  { text: '로딩 중…',         desc: '최신 status 가져오는 중' },
  unknown:  { text: 'NO DATA',         desc: 'status/latest.json 미생성 — 첫 poll 대기 중' },
};

const LABEL = {
  ok: 'HEALTHY', stale: 'STALE', down: 'DOWN',
  fallback: 'FALLBACK', unknown: '—', pending: 'PENDING'
};

function formatAge(min) {
  if (min == null) return '—';
  if (min < 1) return '방금 전';
  if (min < 60) return `${min}분 전`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}시간 전`;
  const day = Math.floor(hr / 24);
  return `${day}일 전`;
}

function setBanner(level) {
  const banner = document.getElementById('banner');
  const dot = document.getElementById('banner-dot');
  const verdict = document.getElementById('banner-verdict');
  const desc = document.getElementById('banner-desc');
  banner.className = `banner ${level}`;
  dot.className = `dot ${level === 'loading' ? 'loading' : level}`;
  verdict.textContent = (VERDICT_COPY[level] || VERDICT_COPY.unknown).text;
  desc.textContent = (VERDICT_COPY[level] || VERDICT_COPY.unknown).desc;
}

function setCard(name, src) {
  const card = document.querySelector(`[data-card="${name}"]`);
  if (!card) return;
  const dot = card.querySelector('.dot');
  const valueEl = card.querySelector('[data-field="value"]');
  const ageEl = card.querySelector('[data-field="age"]');
  const labelEl = card.querySelector('[data-field="label"]');

  if (!src) {
    dot.className = 'dot unknown';
    if (valueEl) valueEl.textContent = '—';
    if (ageEl) ageEl.textContent = '데이터 없음';
    if (labelEl) { labelEl.textContent = '—'; labelEl.className = 'label'; }
    return;
  }

  let level = src.status || 'unknown';
  if (src.fallback && level === 'ok') level = 'fallback';

  dot.className = `dot ${level}`;

  const items = src.items != null ? `${src.items}` : '—';
  const unit = src.items != null ? '<span class="unit">items</span>' : '';
  if (valueEl) valueEl.innerHTML = items + unit;

  if (ageEl) {
    const ageStr = formatAge(src.age_min);
    const fallbackBadge = src.fallback ? ' <span class="badge fallback">fallback</span>' : '';
    ageEl.innerHTML = ageStr + fallbackBadge;
  }

  if (labelEl) {
    labelEl.textContent = LABEL[level] || level.toUpperCase();
    labelEl.className = `label ${level}`;
  }
}

function setCronCard(snapshot) {
  const card = document.querySelector('[data-card="cron"]');
  const dot = card.querySelector('.dot');
  const valueEl = card.querySelector('[data-field="value"]');
  const ageEl = card.querySelector('[data-field="age"]');
  const labelEl = card.querySelector('[data-field="label"]');

  const sources = Object.values(snapshot.sources || {});
  if (!sources.length) {
    dot.className = 'dot unknown';
    valueEl.textContent = '—';
    ageEl.textContent = '—';
    labelEl.textContent = '—';
    return;
  }

  const ages = sources.map(s => s.age_min).filter(a => a != null);
  const minAge = ages.length ? Math.min(...ages) : null;
  const anyDown = sources.some(s => s.status === 'down');
  const anyStale = sources.some(s => s.status === 'stale');
  const anyFallback = sources.some(s => s.fallback);

  let level = 'ok';
  if (anyDown) level = 'down';
  else if (anyStale) level = 'stale';
  else if (anyFallback) level = 'fallback';

  dot.className = `dot ${level}`;
  valueEl.textContent = level === 'ok' ? 'OK' : level.toUpperCase();
  ageEl.textContent = `last fresh ${formatAge(minAge)}`;
  labelEl.textContent = LABEL[level];
  labelEl.className = `label ${level}`;
}

async function refresh() {
  try {
    const r = await fetch(STATUS_URL + '?_=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) throw new Error(r.status);
    const snapshot = await r.json();

    setBanner(snapshot.overall || 'unknown');
    setCard('rates', snapshot.sources?.rates);
    setCard('promos', snapshot.sources?.promos);
    setCronCard(snapshot);
  } catch (e) {
    setBanner('unknown');
    setCard('rates', null);
    setCard('promos', null);
    setCronCard({ sources: {} });
    console.warn('status fetch failed:', e.message);
  }
}

function updateNow() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('now-ts').textContent =
    `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())} KST`;
}

updateNow();
setInterval(updateNow, 1000);
refresh();
setInterval(refresh, 60000);
</script>

</body>
</html>
